<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TRAVEL - Admin - Gestion des Vehicules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f5f7fa; }
        :root { --marine: #1C2D4A; --yellow: #F9B81B; --blue-sky: #4A90E2; --white: #FFFFFF; --gray-bg: #F5F7FA; --success: #2D6A4F; --danger: #EF476F; }

        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background-color: var(--marine); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; transition: all 0.3s ease; z-index: 1000; }
        .sidebar-brand { padding: 1.5rem; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sidebar-brand i { color: var(--yellow); margin-right: 8px; }
        .sidebar-brand span { color: white; }
        .sidebar-menu { list-style: none; padding: 0; margin: 1.5rem 0; flex: 1; }
        .sidebar-menu li { padding: 12px 20px; margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); }
        .sidebar-menu li i { width: 24px; font-size: 1.1rem; color: var(--yellow); }
        .sidebar-menu li:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .sidebar-menu li.active { background-color: var(--yellow); color: var(--marine); }
        .sidebar-menu li.active i { color: var(--marine); }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; margin: 0 15px 15px 15px; border-radius: 12px; }
        .sidebar-footer:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-footer i { color: var(--yellow); font-size: 1.1rem; }
        .main-content { margin-left: 280px; flex: 1; padding: 1.5rem; background-color: var(--gray-bg); min-height: 100vh; width: calc(100% - 280px); }
        .section-title { text-align: center; margin-bottom: 2rem; }
        .section-title h2 { color: var(--marine); font-size: 2rem; font-weight: bold; position: relative; display: inline-block; }
        .section-title h2::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 80px; height: 3px; background-color: var(--yellow); }
        .card { background-color: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; margin-bottom: 1.5rem; }
        .form-container { background-color: var(--gray-bg); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid #e0e0e0; }
        .form-label { font-weight: 500; color: var(--marine); margin-bottom: 0.3rem; }
        .form-control, .form-select { border-radius: 10px; border: 1px solid #ddd; padding: 10px; }
        .form-control:focus, .form-select:focus { border-color: var(--yellow); box-shadow: 0 0 0 0.2rem rgba(249,184,27,0.25); }
        .table { margin-bottom: 0; }
        .table th { background-color: var(--marine); color: white; padding: 12px; font-weight: 500; }
        .table td { vertical-align: middle; padding: 12px; }
        .btn-sm { padding: 5px 12px; margin: 0 3px; font-size: 0.75rem; border-radius: 20px; }
        .btn-danger { background-color: var(--danger); border: none; }
        .btn-primary { background-color: var(--blue-sky); border: none; }
        .btn-warning { background-color: var(--yellow); border: none; color: var(--marine); }
        .modal-content { border-radius: 15px; }
        .modal-header { background-color: var(--marine); color: white; border-radius: 15px 15px 0 0; }
        .modal-header .btn-close { filter: brightness(0) invert(1); }
        .badge-status { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-disponible { background-color: var(--success); color: white; }
        .badge-indisponible { background-color: var(--danger); color: white; }
        .preview-img { width: 60px; height: 50px; object-fit: cover; border-radius: 8px; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-brand span, .sidebar-menu li span, .sidebar-footer span { display: none; } .sidebar-menu li { justify-content: center; margin: 5px 10px; } .sidebar-menu li i { margin: 0; } .main-content { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>

<div class="admin-container">
    <div id="sidebar-container"></div>
    <div class="main-content">
        <div class="section-title"><h2>Gestion des Vehicules</h2></div>

        <div class="card">
            <h4 class="mb-3">Ajouter un nouveau vehicule</h4>
            <div class="form-container">
                <form id="addVehiculeForm" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Modele *</label>
                            <input type="text" class="form-control" id="marque_modele" placeholder="Ex: STAREX" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Immatriculation *</label>
                            <input type="text" class="form-control" id="immatriculation" placeholder="1234-TA" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Places *</label>
                            <input type="number" class="form-control" id="places" placeholder="12" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Chauffeur</label>
                            <input type="text" class="form-control" id="chauffeur" placeholder="Nom du chauffeur">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Etat</label>
                            <select class="form-select" id="etat">
                                <option value="disponible">Disponible</option>
                                <option value="indisponible">Indisponible</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Photo du vehicule</label>
                            <input type="file" class="form-control" id="photo_voiture" accept="image/*">
                            <small class="text-muted">Formats: JPG, PNG, GIF (max 5MB)</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="2" placeholder="Description du vehicule..."></textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter le vehicule</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Liste des vehicules</h4>
                <div>
                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Rechercher..." style="width: 200px;">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Photo</th>
                            <th>Modele</th>
                            <th>Immatriculation</th>
                            <th>Places</th>
                            <th>Chauffeur</th>
                            <th>Description</th>
                            <th>Etat</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vehicules-table"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Modifier le vehicule</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editForm" enctype="multipart/form-data">
                    <input type="hidden" id="edit_id">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Modele *</label>
                            <input type="text" class="form-control" id="edit_marque_modele" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Immatriculation *</label>
                            <input type="text" class="form-control" id="edit_immatriculation" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Places *</label>
                            <input type="number" class="form-control" id="edit_places" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Chauffeur</label>
                            <input type="text" class="form-control" id="edit_chauffeur">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Etat</label>
                            <select class="form-select" id="edit_etat">
                                <option value="disponible">Disponible</option>
                                <option value="indisponible">Indisponible</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Photo actuelle</label>
                            <div id="current_photo_preview" class="mb-2"></div>
                            <label class="form-label">Changer la photo</label>
                            <input type="file" class="form-control" id="edit_photo_voiture" accept="image/*">
                            <small class="text-muted">Laissez vide pour conserver l'image actuelle</small>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="edit_description" rows="3"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                <button type="button" class="btn btn-primary" onclick="updateVehicule()">Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token || user.role !== 'admin') {
        window.location.href = '/connexion.html';
    }

    let currentEditId = null;

    document.getElementById('addVehiculeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('marque_modele', document.getElementById('marque_modele').value);
        formData.append('immatriculations', document.getElementById('immatriculation').value);
        formData.append('places', parseInt(document.getElementById('places').value));
        formData.append('chauffeur', document.getElementById('chauffeur').value || null);
        formData.append('etat', document.getElementById('etat').value);
        formData.append('description', document.getElementById('description').value || null);
        
        const photoFile = document.getElementById('photo_voiture').files[0];
        if (photoFile) {
            formData.append('photo_voiture', photoFile);
        }
        
        try {
            const response = await fetch(`${API_URL}/vehicules`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (response.ok) {
                alert('Vehicule ajoute avec succes');
                document.getElementById('addVehiculeForm').reset();
                document.getElementById('photo_voiture').value = '';
                loadVehicules();
            } else {
                alert('Erreur: ' + (data.message || 'Impossible d ajouter le vehicule'));
            }
        } catch(error) {
            console.error('Erreur:', error);
            alert('Erreur de connexion au serveur');
        }
    });

    async function loadVehicules() {
        try {
            const response = await fetch(`${API_URL}/vehicules`);
            let vehicules = await response.json();
            
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            if (searchTerm) {
                vehicules = vehicules.filter(v => 
                    (v.marque_modele && v.marque_modele.toLowerCase().includes(searchTerm)) ||
                    (v.immatriculations && v.immatriculations.toLowerCase().includes(searchTerm))
                );
            }
            
            const tbody = document.getElementById('vehicules-table');
            if (!vehicules || vehicules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">Aucun vehicule trouve</td></tr>';
                return;
            }
            
            tbody.innerHTML = vehicules.map(v => `
                <tr>
                    <td>${v.id}</td>
                    <td>
                        ${v.photo_voiture ? 
                            `<img src="${v.photo_voiture}" class="preview-img" alt="photo" onerror="this.src='https://via.placeholder.com/60x50?text=No+Image'">` : 
                            '<i class="fas fa-car fa-2x text-muted"></i>'}
                    </td>
                    <td><strong>${v.marque_modele || '-'}</strong></td>
                    <td>${v.immatriculations || '-'}</td>
                    <td><i class="fas fa-users"></i> ${v.places || '-'}</td>
                    <td>${v.chauffeur || '-'}</td>
                    <td style="max-width: 200px;">${v.description ? v.description.substring(0, 50) + (v.description.length > 50 ? '...' : '') : '-'}</td>
                    <td>
                        <span class="badge-status ${v.etat === 'disponible' ? 'badge-disponible' : 'badge-indisponible'}">
                            ${v.etat === 'disponible' ? 'Disponible' : 'Indisponible'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="openEditModal(${v.id})">
                            <i class="fas fa-edit"></i> Modifier
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="supprimerVehicule(${v.id})">
                            <i class="fas fa-trash"></i> Supprimer
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch(e) {
            console.error('Erreur chargement vehicules:', e);
        }
    }

    async function openEditModal(id) {
        try {
            const response = await fetch(`${API_URL}/vehicules/${id}`);
            const vehicule = await response.json();
            
            document.getElementById('edit_id').value = vehicule.id;
            document.getElementById('edit_marque_modele').value = vehicule.marque_modele || '';
            document.getElementById('edit_immatriculation').value = vehicule.immatriculations || '';
            document.getElementById('edit_places').value = vehicule.places;
            document.getElementById('edit_chauffeur').value = vehicule.chauffeur || '';
            document.getElementById('edit_etat').value = vehicule.etat || 'disponible';
            document.getElementById('edit_description').value = vehicule.description || '';
            
            const previewDiv = document.getElementById('current_photo_preview');
            if (vehicule.photo_voiture) {
                previewDiv.innerHTML = `<img src="${vehicule.photo_voiture}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 10px;">`;
            } else {
                previewDiv.innerHTML = '<p class="text-muted">Aucune photo disponible</p>';
            }
            
            document.getElementById('edit_photo_voiture').value = '';
            
            currentEditId = id;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        } catch(e) {
            console.error('Erreur:', e);
            alert('Erreur lors du chargement du vehicule');
        }
    }

    async function updateVehicule() {
        const formData = new FormData();
        formData.append('marque_modele', document.getElementById('edit_marque_modele').value);
        formData.append('immatriculations', document.getElementById('edit_immatriculation').value);
        formData.append('places', parseInt(document.getElementById('edit_places').value));
        formData.append('chauffeur', document.getElementById('edit_chauffeur').value || null);
        formData.append('etat', document.getElementById('edit_etat').value);
        formData.append('description', document.getElementById('edit_description').value || null);
        
        const photoFile = document.getElementById('edit_photo_voiture').files[0];
        if (photoFile) {
            formData.append('photo_voiture', photoFile);
        }
        
        try {
            const response = await fetch(`${API_URL}/vehicules/${currentEditId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            
            if (response.ok) {
                alert('Vehicule modifie avec succes');
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadVehicules();
            } else {
                const error = await response.json();
                alert('Erreur: ' + (error.message || 'Impossible de modifier le vehicule'));
            }
        } catch(error) {
            console.error('Erreur:', error);
            alert('Erreur de connexion au serveur');
        }
    }

    async function supprimerVehicule(id) {
        if (!confirm('Etes-vous sur de vouloir supprimer ce vehicule ?')) return;
        
        try {
            const response = await fetch(`${API_URL}/vehicules/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                alert('Vehicule supprime avec succes');
                loadVehicules();
            } else {
                const error = await response.json();
                alert('Erreur: ' + (error.message || 'Impossible de supprimer le vehicule'));
            }
        } catch(e) {
            console.error('Erreur:', e);
            alert('Erreur de connexion');
        }
    }

    document.getElementById('searchInput').addEventListener('keyup', () => {
        loadVehicules();
    });

    loadVehicules();

    fetch('sidebar-admin.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            document.getElementById('menu-vehicules').classList.add('active');
            window.logout = function() {
                localStorage.clear();
                window.location.href = '/connexion.html';
            };
        })
        .catch(error => console.error('Erreur chargement sidebar:', error));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

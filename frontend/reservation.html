<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TRAVEL - Réservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/config.js"></script>
    <link rel="stylesheet" href="/css/client-common.css">
    <style>
        .seat-map {
            background: #f0f2f5;
            border-radius: 15px;
            padding: 15px 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .seat {
            width: 40px;
            height: 40px;
            margin: 4px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
        }
        .seat-available {
            background-color: #4A90E2;
            color: white;
            border: 2px solid #4A90E2;
        }
        .seat-available:hover {
            background-color: #1C2D4A;
            transform: scale(1.05);
        }
        .seat-selected {
            background-color: #F9B81B;
            color: #1C2D4A;
            border: 2px solid #F9B81B;
        }
        .seat-unavailable {
            background-color: #EF476F;
            color: white;
            border: 2px solid #EF476F;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .seat-driver {
            background-color: #1C2D4A;
            color: white;
            border: 2px solid #1C2D4A;
            cursor: default;
        }
        .seat-driver i {
            font-size: 16px;
        }
        .seat-driver span {
            display: none;
        }
        .seat-legend {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            margin-right: 6px;
        }
        .vehicle-outline {
            border: 2px solid #1C2D4A;
            border-radius: 16px;
            padding: 12px 8px;
            background: white;
        }
        .seat-row {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2px;
        }
        .section-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .section-title h2 {
            color: var(--marine);
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            display: inline-block;
        }
        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--yellow);
        }
        .card {
            background-color: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-weight: 500;
            color: var(--marine);
            margin-bottom: 0.3rem;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--yellow);
            box-shadow: 0 0 0 0.2rem rgba(249,184,27,0.25);
        }
        .btn-success {
            background-color: #2D6A4F;
            border: none;
        }
        .btn-success:hover {
            background-color: #1e4a36;
        }
        .legend-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #ddd;
        }
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            color: #555;
        }
        .legend-item .seat-legend {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 6px;
        }
        @media (max-width: 768px) {
            .seat {
                width: 30px;
                height: 30px;
                font-size: 9px;
                margin: 3px;
                border-radius: 6px;
            }
            .seat-map {
                padding: 10px 5px;
            }
            .vehicle-outline {
                padding: 8px 4px;
            }
            .seat-row {
                gap: 1px;
                margin-bottom: 3px;
            }
            .section-title h2 {
                font-size: 1.5rem;
            }
            .seat-driver i {
                font-size: 12px;
            }
            .legend-item {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="container my-5">
        <div class="section-title">
            <h2>Reserver un voyage</h2>
            <p>Remplissez le formulaire ci-dessous</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <form id="reservation-form" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Choisissez votre trajet</label>
                                <select class="form-control" id="trajet_id" required>
                                    <option value="">Chargement...</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Nombre de passagers</label>
                                <input type="number" class="form-control" id="nombre_passagers" min="1" max="20" value="1" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Prix total</label>
                                <input type="text" class="form-control" id="prix_total" readonly style="background-color: #e9ecef; font-weight: bold; color: #1C2D4A;">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nom du payeur</label>
                                <input type="text" class="form-control" id="nom_payeur" placeholder="Nom complet" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telephone du payeur</label>
                                <input type="tel" class="form-control" id="telephone_payeur" placeholder="034 00 000 00" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Selectionnez vos sieges (cliquez sur les places)</label>
                            <div class="seat-map">
                                <div class="vehicle-outline">
                                    <div id="seats-container"></div>
                                </div>
                                
                                <div class="legend-container">
                                    <span class="legend-item"><span class="seat-legend seat-available"></span> Disponible</span>
                                    <span class="legend-item"><span class="seat-legend seat-selected"></span> Selectionne</span>
                                    <span class="legend-item"><span class="seat-legend seat-unavailable"></span> Indisponible</span>
                                    <span class="legend-item"><span class="seat-legend seat-driver"></span> Conducteur</span>
                                </div>
                            </div>
                            
                            <input type="hidden" id="sieges" name="sieges">
                            <div id="selected-seats-display" class="mt-2 text-muted small text-center"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Operateur Mobile Money</label>
                                <select class="form-control" id="operateur" required>
                                    <option value="Telma">Telma</option>
                                    <option value="Airtel">Airtel</option>
                                    <option value="Orange">Orange</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Reference du paiement</label>
                                <input type="text" class="form-control" id="reference_paiement" placeholder="Numero de transaction" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Preuve de paiement (capture d'ecran)</label>
                                <input type="file" class="form-control" id="preuve_paiement" accept="image/*">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100" style="background-color: #2D6A4F; border: none; padding: 12px;">Confirmer la reservation</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/connexion.html';
    }

    let selectedSeats = [];
    let currentPrixParPersonne = 0;
    let currentPlacesDisponibles = 20;

    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }

    function generateSeatMap(capaciteMax = 20) {
        const container = document.getElementById('seats-container');
        let html = '';
        
        html += `<div class="seat-row">`;
        html += `<div class="seat seat-driver" data-seat="Cond" data-driver="true">`;
        html += `<i class="fas fa-steering-wheel"></i><span>Cond</span>`;
        html += `</div>`;
        for (let j = 1; j <= 2; j++) {
            const seatNumber = `${j}`;
            html += `<div class="seat seat-available" data-seat="${seatNumber}" data-driver="false">${seatNumber}</div>`;
        }
        html += `</div>`;
        
        let seatCounter = 3;
        
        while (seatCounter <= capaciteMax) {
            html += `<div class="seat-row">`;
            for (let j = 0; j < 4; j++) {
                if (seatCounter <= capaciteMax) {
                    const seatNumber = `${seatCounter}`;
                    html += `<div class="seat seat-available" data-seat="${seatNumber}" data-driver="false">${seatNumber}</div>`;
                    seatCounter++;
                }
            }
            html += `</div>`;
        }
        
        container.innerHTML = html;
        
        const seats = document.querySelectorAll('.seat');
        seats.forEach(seat => {
            if (seat.classList.contains('seat-available')) {
                seat.addEventListener('click', () => toggleSeat(seat));
            }
        });
    }

    function toggleSeat(seat) {
        const seatNumber = seat.getAttribute('data-seat');
        const maxPassagers = parseInt(document.getElementById('nombre_passagers').value);
        
        if (seat.classList.contains('seat-selected')) {
            seat.classList.remove('seat-selected');
            seat.classList.add('seat-available');
            selectedSeats = selectedSeats.filter(s => s !== seatNumber);
        } else if (selectedSeats.length < maxPassagers) {
            seat.classList.remove('seat-available');
            seat.classList.add('seat-selected');
            selectedSeats.push(seatNumber);
        } else {
            alert(`Vous ne pouvez selectionner que ${maxPassagers} siege(s).`);
        }
        
        updateSelectedSeatsDisplay();
        updatePrixTotal();
    }

    function updateSelectedSeatsDisplay() {
        const display = document.getElementById('selected-seats-display');
        const hiddenInput = document.getElementById('sieges');
        
        if (selectedSeats.length === 0) {
            display.innerHTML = '<i class="fas fa-info-circle"></i> Aucun siege selectionne';
            hiddenInput.value = '';
        } else {
            display.innerHTML = `<i class="fas fa-check-circle" style="color: #2D6A4F;"></i> Sieges selectionnes : ${selectedSeats.join(', ')}`;
            hiddenInput.value = selectedSeats.join(',');
        }
    }

    function updatePrixTotal() {
        const nombrePassagers = parseInt(document.getElementById('nombre_passagers').value);
        const prixTotalInput = document.getElementById('prix_total');
        const total = currentPrixParPersonne * nombrePassagers;
        prixTotalInput.value = total.toLocaleString() + ' Ar';
    }

    async function loadTrajets() {
        try {
            const response = await fetch(`${API_URL}/trajets/a-venir`);
            const trajets = await response.json();
            const select = document.getElementById('trajet_id');
            select.innerHTML = '<option value="">Selectionnez un trajet</option>';
            trajets.forEach(trajet => {
                select.innerHTML += `<option value="${trajet.id}" data-prix="${trajet.frais}" data-places="${trajet.places_disponibles}">${trajet.depart} → ${trajet.destination} - ${new Date(trajet.date_depart).toLocaleDateString('fr-FR')} - ${trajet.frais.toLocaleString()} Ar</option>`;
            });
        } catch (error) {
            console.error('Erreur:', error);
        }
    }

    document.getElementById('trajet_id').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const prix = selectedOption.getAttribute('data-prix');
        const placesDisponibles = parseInt(selectedOption.getAttribute('data-places') || 20);
        
        if (prix) {
            currentPrixParPersonne = parseInt(prix);
            updatePrixTotal();
        }
        
        currentPlacesDisponibles = placesDisponibles;
        selectedSeats = [];
        generateSeatMap(placesDisponibles);
        updateSelectedSeatsDisplay();
        
        document.getElementById('nombre_passagers').max = placesDisponibles;
        document.getElementById('nombre_passagers').value = Math.min(1, placesDisponibles);
        
        const infoDiv = document.getElementById('selected-seats-display');
        infoDiv.innerHTML = `<i class="fas fa-info-circle"></i> Places disponibles: ${placesDisponibles}<br>`;
        updateSelectedSeatsDisplay();
    });

    document.getElementById('nombre_passagers').addEventListener('change', function() {
        const maxSeats = parseInt(this.value);
        if (selectedSeats.length > maxSeats) {
            alert(`Le nombre de passagers a ete reduit a ${maxSeats}.`);
            while (selectedSeats.length > maxSeats) {
                const removed = selectedSeats.pop();
                const seatElement = document.querySelector(`.seat[data-seat="${removed}"]`);
                if (seatElement) {
                    seatElement.classList.remove('seat-selected');
                    seatElement.classList.add('seat-available');
                }
            }
            updateSelectedSeatsDisplay();
        }
        updatePrixTotal();
    });

    document.getElementById('reservation-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const trajet_id = document.getElementById('trajet_id').value;
        const nombre_passagers = parseInt(document.getElementById('nombre_passagers').value);
        const sieges = document.getElementById('sieges').value;
        const operateur = document.getElementById('operateur').value;
        const nom_payeur = document.getElementById('nom_payeur').value;
        const telephone_payeur = document.getElementById('telephone_payeur').value;
        const reference_paiement = document.getElementById('reference_paiement').value;
        const preuve_paiement = document.getElementById('preuve_paiement').files[0];
        const frais_total = currentPrixParPersonne * nombre_passagers;
        
        if (!trajet_id) {
            alert('Veuillez selectionner un trajet');
            return;
        }
        
        if (selectedSeats.length !== nombre_passagers) {
            alert(`Veuillez selectionner exactement ${nombre_passagers} siege(s).`);
            return;
        }
        
        if (!nom_payeur) {
            alert('Veuillez entrer le nom du payeur');
            return;
        }
        
        if (!telephone_payeur) {
            alert('Veuillez entrer le telephone du payeur');
            return;
        }
        
        const formData = new FormData();
        formData.append('trajet_id', parseInt(trajet_id));
        formData.append('nombre_passagers', nombre_passagers);
        formData.append('sieges', sieges);
        formData.append('frais_total', frais_total);
        formData.append('operateur', operateur);
        formData.append('nom_payeur', nom_payeur);
        formData.append('telephone_payeur', telephone_payeur);
        formData.append('reference_paiement', reference_paiement);
        if (preuve_paiement) {
            formData.append('preuve_paiement', preuve_paiement);
        }
        
        try {
            const response = await fetch(`${API_URL}/reservations`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (response.ok) {
                alert(`Reservation confirmee ! Numero: ${data.reservation.numero_reservation}`);
                window.location.href = '/historique.html';
            } else {
                alert(data.message || 'Erreur lors de la reservation');
            }
        } catch (error) {
            console.error('Erreur:', error);
            alert('Erreur de connexion au serveur');
        }
    });
    
    loadTrajets();
    generateSeatMap(20);

    fetch('/client-header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const nameSpan = document.getElementById('client-user-name');
            if (nameSpan) nameSpan.innerText = user.nom || 'Client';
        })
        .catch(error => console.error('Erreur chargement header:', error));

    fetch('/client-footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        })
        .catch(error => console.error('Erreur chargement footer:', error));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/client-common.js"></script>
</body>
</html>

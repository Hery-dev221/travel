<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TRAVEL - Admin - Gestion des Trajets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f7fa;
        }

        :root {
            --marine: #1C2D4A;
            --yellow: #F9B81B;
            --blue-sky: #4A90E2;
            --white: #FFFFFF;
            --gray-bg: #F5F7FA;
            --success: #2D6A4F;
            --danger: #EF476F;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background-color: var(--marine);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-brand i {
            color: var(--yellow);
            margin-right: 8px;
        }

        .sidebar-brand span {
            color: white;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0;
            flex: 1;
        }

        .sidebar-menu li {
            padding: 12px 20px;
            margin: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.8);
        }

        .sidebar-menu li i {
            width: 24px;
            font-size: 1.1rem;
            color: var(--yellow);
        }

        .sidebar-menu li:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        .sidebar-menu li.active {
            background-color: var(--yellow);
            color: var(--marine);
        }

        .sidebar-menu li.active i {
            color: var(--marine);
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 15px 15px 15px;
            border-radius: 12px;
        }

        .sidebar-footer:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .sidebar-footer i {
            color: var(--yellow);
            font-size: 1.1rem;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 1.5rem;
            background-color: var(--gray-bg);
            min-height: 100vh;
            width: calc(100% - 280px);
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .section-title h2 {
            color: var(--marine);
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--yellow);
        }

        .card {
            background-color: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            margin-bottom: 1.5rem;
        }

        .form-container {
            background-color: var(--gray-bg);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #e0e0e0;
        }

        .form-label {
            font-weight: 500;
            color: var(--marine);
            margin-bottom: 0.3rem;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--yellow);
            box-shadow: 0 0 0 0.2rem rgba(249,184,27,0.25);
        }

        .table {
            margin-bottom: 0;
        }

        .table th {
            background-color: var(--marine);
            color: white;
            padding: 12px;
            font-weight: 500;
        }

        .table td {
            vertical-align: middle;
            padding: 12px;
        }

        .btn-sm {
            padding: 5px 12px;
            margin: 0 3px;
            font-size: 0.75rem;
            border-radius: 20px;
        }

        .btn-success {
            background-color: var(--success);
            border: none;
        }

        .btn-success:hover {
            background-color: #1e4a36;
        }

        .btn-danger {
            background-color: var(--danger);
            border: none;
        }

        .btn-danger:hover {
            background-color: #c73e5e;
        }

        .btn-primary {
            background-color: var(--blue-sky);
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--marine);
        }

        .btn-warning {
            background-color: var(--yellow);
            border: none;
            color: var(--marine);
        }

        .btn-warning:hover {
            background-color: #e5a800;
        }

        .modal-content {
            border-radius: 15px;
        }

        .modal-header {
            background-color: var(--marine);
            color: white;
            border-radius: 15px 15px 0 0;
        }

        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }

        .badge-vehicule {
            background-color: #e9ecef;
            color: #1C2D4A;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-brand span,
            .sidebar-menu li span,
            .sidebar-footer span {
                display: none;
            }

            .sidebar-menu li {
                justify-content: center;
                margin: 5px 10px;
            }

            .sidebar-menu li i {
                margin: 0;
            }

            .main-content {
                margin-left: 70px;
                width: calc(100% - 70px);
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="section-title"><h2>Gestion des Trajets</h2></div>

            <div class="card">
                <h4 class="mb-3">Ajouter un nouveau trajet</h4>
                <div class="form-container">
                    <form id="addTrajetForm">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Depart</label>
                                <input type="text" class="form-control" id="depart" placeholder="Antananarivo" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Destination</label>
                                <input type="text" class="form-control" id="destination" placeholder="Moramanga" required>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="form-label">Date depart</label>
                                <input type="date" class="form-control" id="date_depart" required>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="form-label">Heure depart</label>
                                <input type="time" class="form-control" id="heure_depart" required>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="form-label">Prix (Ar)</label>
                                <input type="number" class="form-control" id="frais" placeholder="20000" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Vehicule</label>
                                <select class="form-select" id="vehicule_id" required>
                                    <option value="">Selectionner un vehicule</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Statut</label>
                                <select class="form-select" id="statut">
                                    <option value="actif">Actif</option>
                                    <option value="annule">Annule</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">Ajouter le trajet</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Liste des trajets</h4>
                    <div>
                        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Rechercher..." style="width: 200px;">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Depart</th>
                                <th>Destination</th>
                                <th>Date</th>
                                <th>Heure</th>
                                <th>Prix</th>
                                <th>Places</th>
                                <th>Vehicule</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="trajets-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editTrajetModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modifier le trajet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editTrajetForm">
                        <input type="hidden" id="edit_id">
                        <div class="mb-3">
                            <label class="form-label">Depart</label>
                            <input type="text" class="form-control" id="edit_depart" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Destination</label>
                            <input type="text" class="form-control" id="edit_destination" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date depart</label>
                            <input type="date" class="form-control" id="edit_date_depart" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Heure depart</label>
                            <input type="time" class="form-control" id="edit_heure_depart" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Prix (Ar)</label>
                            <input type="number" class="form-control" id="edit_frais" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Vehicule</label>
                            <select class="form-select" id="edit_vehicule_id" required>
                                <option value="">Selectionner un vehicule</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Statut</label>
                            <select class="form-select" id="edit_statut">
                                <option value="actif">Actif</option>
                                <option value="annule">Annule</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="updateTrajet()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') window.location.href = '/connexion.html';

        let currentEditId = null;
        let vehiculesList = [];

        function setMinDate() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(input => input.setAttribute('min', today));
        }

        async function loadVehiculesForSelect() {
            try {
                const response = await fetch(`${API_URL}/vehicules`);
                const vehicules = await response.json();
                vehiculesList = vehicules;

                const selectAdd = document.getElementById('vehicule_id');
                const selectEdit = document.getElementById('edit_vehicule_id');

                if (vehicules && vehicules.length > 0) {
                    let options = '<option value="">Selectionner un vehicule</option>';
                    vehicules.forEach(v => {
                        options +=
                            `<option value="${v.id}">${v.marque_modele || v.type || v.model} - ${v.immatriculations || 'N/A'} (${v.places} places)</option>`;
                    });
                    selectAdd.innerHTML = options;
                    selectEdit.innerHTML = options;
                } else {
                    selectAdd.innerHTML = '<option value="">Aucun vehicule disponible</option>';
                    selectEdit.innerHTML = '<option value="">Aucun vehicule disponible</option>';
                }
            } catch (e) { console.error(e); }
        }

        function getVehiculeInfo(vehiculeId) {
            const vehicule = vehiculesList.find(v => v.id === vehiculeId);
            if (vehicule) {
                return {
                    modele: vehicule.marque_modele || vehicule.type || vehicule.model || '-',
                    immatriculation: vehicule.immatriculations || '-'
                };
            }
            return { modele: '-', immatriculation: '-' };
        }

        document.getElementById('addTrajetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dateDepart = document.getElementById('date_depart').value;
            const today = new Date().toISOString().split('T')[0];
            if (dateDepart < today) { alert('La date de depart ne peut pas être antérieure à aujourd\'hui'); return; }

            const trajetData = {
                depart: document.getElementById('depart').value,
                destination: document.getElementById('destination').value,
                date_depart: dateDepart,
                heure_depart: document.getElementById('heure_depart').value,
                frais: parseInt(document.getElementById('frais').value),
                places_disponibles: 12,
                vehicule_id: parseInt(document.getElementById('vehicule_id').value),
                statut: document.getElementById('statut').value
            };

            try {
                const response = await fetch(`${API_URL}/trajets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(trajetData)
                });
                if (response.ok) {
                    alert('Trajet ajoute avec succes');
                    document.getElementById('addTrajetForm').reset();
                    setMinDate();
                    loadTrajets();
                } else {
                    const error = await response.json();
                    alert('Erreur: ' + (error.message || 'Impossible d ajouter le trajet'));
                }
            } catch (error) { console.error(error);
                alert('Erreur de connexion au serveur'); }
        });

        async function loadTrajets() {
            try {
                const response = await fetch(`${API_URL}/trajets`, { headers: { 'Authorization': `Bearer ${token}` } });
                let trajets = await response.json();

                const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
                if (searchTerm) {
                    trajets = trajets.filter(t =>
                        (t.depart && t.depart.toLowerCase().includes(searchTerm)) ||
                        (t.destination && t.destination.toLowerCase().includes(searchTerm))
                    );
                }

                const tbody = document.getElementById('trajets-table');
                if (!trajets || trajets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center">Aucun trajet trouve</td></tr>';
                    return;
                }

                const today = new Date().toISOString().split('T')[0];

                tbody.innerHTML = trajets.map(t => {
                    const isPast = t.date_depart < today;
                    let realStatut = t.statut;
                    if (isPast && t.statut !== 'annule') realStatut = 'termine';

                    let statutClass = realStatut === 'actif' ? 'bg-success' : (realStatut === 'annule' ? 'bg-danger' :
                        'bg-secondary');
                    let statutText = realStatut === 'actif' ? 'Actif' : (realStatut === 'annule' ? 'Annule' : 'Termine');

                    const disableModify = isPast ? 'disabled' : '';
                    const vehiculeInfo = getVehiculeInfo(t.vehicule_id);

                    return `<tr>
                            <td>${t.id}</td>
                            <td>${t.depart || '-'}</td>
                            <td>${t.destination || '-'}</td>
                            <td>${t.date_depart ? new Date(t.date_depart).toLocaleDateString('fr-FR') : '-'}</td>
                            <td>${t.heure_depart ? t.heure_depart.substring(0,5) : '-'}</td>
                            <td>${t.frais ? t.frais.toLocaleString() : '-'} Ar</td>
                            <td>${t.places_disponibles || '-'}</td>
                            <td>
                                <span class="badge-vehicule">
                                    <i class="fas fa-car"></i> ${vehiculeInfo.immatriculation}
                                    <small class="text-muted d-block">${vehiculeInfo.modele}</small>
                                </span>
                            </td>
                            <td><span class="badge ${statutClass}">${statutText}</span></td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="openEditModal(${t.id})" ${disableModify}>Modifier</button>
                                <button class="btn btn-sm btn-danger" onclick="supprimerTrajet(${t.id})">Supprimer</button>
                            </td>
                        </tr>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function openEditModal(id) {
            try {
                const response = await fetch(`${API_URL}/trajets/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const trajet = await response.json();
                const today = new Date().toISOString().split('T')[0];
                if (trajet.date_depart < today) { alert('Ce trajet est deja termine, vous ne pouvez pas le modifier'); return; }

                document.getElementById('edit_id').value = trajet.id;
                document.getElementById('edit_depart').value = trajet.depart;
                document.getElementById('edit_destination').value = trajet.destination;
                document.getElementById('edit_date_depart').value = trajet.date_depart ? trajet.date_depart.split('T')[0] :
                '';
                document.getElementById('edit_heure_depart').value = trajet.heure_depart ? trajet.heure_depart.substring(0,
                5) : '';
                document.getElementById('edit_frais').value = trajet.frais;
                document.getElementById('edit_vehicule_id').value = trajet.vehicule_id;
                document.getElementById('edit_statut').value = trajet.statut || 'actif';

                currentEditId = id;
                new bootstrap.Modal(document.getElementById('editTrajetModal')).show();
            } catch (e) { console.error(e);
                alert('Erreur lors du chargement du trajet'); }
        }

        async function updateTrajet() {
            const dateDepart = document.getElementById('edit_date_depart').value;
            const today = new Date().toISOString().split('T')[0];
            if (dateDepart < today) { alert('La date de depart ne peut pas être antérieure à aujourd\'hui'); return; }

            const trajetData = {
                depart: document.getElementById('edit_depart').value,
                destination: document.getElementById('edit_destination').value,
                date_depart: dateDepart,
                heure_depart: document.getElementById('edit_heure_depart').value,
                frais: parseInt(document.getElementById('edit_frais').value),
                places_disponibles: 12,
                vehicule_id: parseInt(document.getElementById('edit_vehicule_id').value),
                statut: document.getElementById('edit_statut').value
            };

            try {
                const response = await fetch(`${API_URL}/trajets/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(trajetData)
                });
                if (response.ok) {
                    alert('Trajet modifie avec succes');
                    bootstrap.Modal.getInstance(document.getElementById('editTrajetModal')).hide();
                    loadTrajets();
                } else {
                    const error = await response.json();
                    alert('Erreur: ' + (error.message || 'Impossible de modifier le trajet'));
                }
            } catch (error) { console.error(error);
                alert('Erreur de connexion au serveur'); }
        }

        async function supprimerTrajet(id) {
            if (!confirm('Etes-vous sur de vouloir supprimer ce trajet ?')) return;
            try {
                const response = await fetch(`${API_URL}/trajets/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if (response.ok) { alert('Trajet supprime avec succes');
                    loadTrajets(); } else { alert('Erreur lors de la suppression'); }
            } catch (e) { console.error(e);
                alert('Erreur de connexion'); }
        }

        document.getElementById('searchInput').addEventListener('keyup', () => loadTrajets());

        setMinDate();
        loadVehiculesForSelect();
        loadTrajets();

        fetch('sidebar-admin.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                document.getElementById('menu-trajets').classList.add('active');
                window.logout = function() {
                    localStorage.clear();
                    window.location.href = '/connexion.html';
                };
            })
            .catch(error => console.error('Erreur chargement sidebar:', error));
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

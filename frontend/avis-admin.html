<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TRAVEL - Admin - Gestion des Avis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f5f7fa; }
        :root { --marine: #1C2D4A; --yellow: #F9B81B; --blue-sky: #4A90E2; --white: #FFFFFF; --gray-bg: #F5F7FA; --success: #2D6A4F; --danger: #EF476F; }

        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background-color: var(--marine); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; transition: all 0.3s ease; z-index: 1000; }
        .sidebar-brand { padding: 1.5rem; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sidebar-brand i { color: var(--yellow); margin-right: 8px; }
        .sidebar-brand span { color: white; }
        .sidebar-menu { list-style: none; padding: 0; margin: 1.5rem 0; flex: 1; }
        .sidebar-menu li { padding: 12px 20px; margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); }
        .sidebar-menu li i { width: 24px; font-size: 1.1rem; color: var(--yellow); }
        .sidebar-menu li:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .sidebar-menu li.active { background-color: var(--yellow); color: var(--marine); }
        .sidebar-menu li.active i { color: var(--marine); }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; margin: 0 15px 15px 15px; border-radius: 12px; }
        .sidebar-footer:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-footer i { color: var(--yellow); font-size: 1.1rem; }
        .main-content { margin-left: 280px; flex: 1; padding: 1.5rem; background-color: var(--gray-bg); min-height: 100vh; width: calc(100% - 280px); }
        .section-title { text-align: center; margin-bottom: 2rem; }
        .section-title h2 { color: var(--marine); font-size: 2rem; font-weight: bold; position: relative; display: inline-block; }
        .section-title h2::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 80px; height: 3px; background-color: var(--yellow); }
        .card { background-color: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; margin-bottom: 1.5rem; }
        .avis-card { background-color: var(--gray-bg); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .stars { color: var(--yellow); margin-bottom: 0.5rem; }
        .btn-sm { padding: 5px 12px; margin: 0 3px; font-size: 0.75rem; border-radius: 20px; }
        .btn-success { background-color: var(--success); border: none; }
        .btn-danger { background-color: var(--danger); border: none; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.5rem; }
        .tab-btn { background: none; border: none; padding: 8px 20px; font-weight: 500; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .tab-btn.active { background-color: var(--marine); color: white; }
        .tab-btn:hover:not(.active) { background-color: #e0e0e0; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-brand span, .sidebar-menu li span, .sidebar-footer span { display: none; } .sidebar-menu li { justify-content: center; margin: 5px 10px; } .sidebar-menu li i { margin: 0; } .main-content { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>

<div class="admin-container">
    <div id="sidebar-container"></div>
    <div class="main-content">
        <div class="section-title">
            <h2>Gestion des Avis</h2>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('attente')">En attente</button>
                <button class="tab-btn" onclick="showTab('publies')">Publies</button>
                <button class="tab-btn" onclick="showTab('rejetes')">Rejetes</button>
            </div>
            <div id="attente-container"></div>
            <div id="publies-container" style="display: none;"></div>
            <div id="rejetes-container" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token || user.role !== 'admin') {
        window.location.href = '/connexion.html';
    }

    let currentTab = 'attente';

    function showTab(tab) {
        currentTab = tab;
        document.getElementById('attente-container').style.display = tab === 'attente' ? 'block' : 'none';
        document.getElementById('publies-container').style.display = tab === 'publies' ? 'block' : 'none';
        document.getElementById('rejetes-container').style.display = tab === 'rejetes' ? 'block' : 'none';
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        if (tab === 'attente') loadAvisEnAttente();
        else if (tab === 'publies') loadAvisPublies();
        else if (tab === 'rejetes') loadAvisRejetes();
    }

    async function loadAvisEnAttente() {
        try {
            const response = await fetch(`${API_URL}/avis/admin/en-attente`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const avis = await response.json();
            const container = document.getElementById('attente-container');
            if (!avis || avis.length === 0) {
                container.innerHTML = '<p class="text-center">Aucun avis en attente</p>';
                return;
            }
            container.innerHTML = avis.map(a => `
                <div class="avis-card">
                    <div class="stars">
                        ${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}
                    </div>
                    <p><strong>${a.client_nom}</strong> - ${a.email || ''}</p>
                    <p>"${a.commentaire}"</p>
                    <small class="text-muted">Date: ${new Date(a.date_creation).toLocaleDateString('fr-FR')}</small>
                    <div class="mt-2">
                        <button class="btn btn-sm btn-success" onclick="publierAvis(${a.id})">
                            <i class="fas fa-check"></i> Publier
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="rejeterAvis(${a.id})">
                            <i class="fas fa-times"></i> Rejeter
                        </button>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadAvisPublies() {
        try {
            const response = await fetch(`${API_URL}/avis/publies`);
            const avis = await response.json();
            const container = document.getElementById('publies-container');
            if (!avis || avis.length === 0) {
                container.innerHTML = '<p class="text-center">Aucun avis publie</p>';
                return;
            }
            container.innerHTML = avis.map(a => `
                <div class="avis-card">
                    <div class="stars">
                        ${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}
                    </div>
                    <p><strong>${a.client_nom}</strong></p>
                    <p>"${a.commentaire}"</p>
                    <small class="text-muted">Publie le: ${new Date(a.date_publication).toLocaleDateString('fr-FR')}</small>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadAvisRejetes() {
        try {
            const response = await fetch(`${API_URL}/avis/admin/rejetes`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).catch(() => ({ json: () => [] }));
            const avis = await response.json();
            const container = document.getElementById('rejetes-container');
            if (!avis || avis.length === 0) {
                container.innerHTML = '<p class="text-center">Aucun avis rejete</p>';
                return;
            }
            container.innerHTML = avis.map(a => `
                <div class="avis-card">
                    <div class="stars">
                        ${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}
                    </div>
                    <p><strong>${a.client_nom}</strong> - ${a.email || ''}</p>
                    <p>"${a.commentaire}"</p>
                    <small class="text-muted">Date: ${new Date(a.date_creation).toLocaleDateString('fr-FR')}</small>
                    <div class="mt-2">
                        <button class="btn btn-sm btn-success" onclick="publierAvis(${a.id})">
                            <i class="fas fa-check"></i> Publier
                        </button>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function publierAvis(id) {
        const response = await fetch(`${API_URL}/avis/admin/${id}/publier`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            alert('Avis publie');
            if (currentTab === 'attente') loadAvisEnAttente();
            else loadAvisRejetes();
        } else {
            alert('Erreur');
        }
    }

    async function rejeterAvis(id) {
        const response = await fetch(`${API_URL}/avis/admin/${id}/rejeter`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            alert('Avis rejete');
            loadAvisEnAttente();
        } else {
            alert('Erreur');
        }
    }

    loadAvisEnAttente();

    fetch('sidebar-admin.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            document.getElementById('menu-avis').classList.add('active');
            window.logout = function() {
                localStorage.clear();
                window.location.href = '/connexion.html';
            };
        })
        .catch(error => console.error('Erreur chargement sidebar:', error));
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
